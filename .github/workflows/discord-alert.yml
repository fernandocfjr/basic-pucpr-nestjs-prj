name: Discord

on:
  pull_request:
    types:
      - opened
      - reopened

jobs:
  Discord_notification:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{
            "content": "🚀 Nova Pull Request aberta: ${{ github.event.pull_request.title }}\n\nAutor: ${{ github.actor }}\nBranch: ${{ github.head_ref }} → ${{ github.base_ref }}\nURL: ${{ github.event.pull_request.html_url }}"
          }' \
          ${{ secrets.DISCORD_WEBHOOK }}
