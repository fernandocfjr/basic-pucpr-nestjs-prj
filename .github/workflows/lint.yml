name: Lint

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run the linter
        run: yarn lint

  Discord_notification:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Send Discord notification
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{
            "content": "🚀 Nova Pull Request aberta: ${{ github.event.pull_request.title }}\nAutor: ${{ github.actor }}\nBranch: ${{ github.head_ref }} → ${{ github.base_ref }}\nURL: ${{ github.event.pull_request.html_url }}"
          }' \
          ${{ secrets.DISCORD_WEBHOOK }}
