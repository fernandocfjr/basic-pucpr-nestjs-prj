services:
  mysql:
    image: mysql:8.4
    container_name: pucpr-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pucpr
    # Host 3307 avoids conflict when MySQL (or another app) already uses 3306 locally.
    # Inside the compose network the API still uses mysql:3306.
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -uroot -proot']
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pucpr-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_DATABASE: pucpr
    ports:
      - '3000:3000'
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
